name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-analyze:
    name: Build and Analyze
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: javacloudexpert
      SONAR_PROJECT_KEY: JavaCloudExpert_enterprise-microservice-boilerplate2  # displays as "enterprise-service" in SonarCloud

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check Code Formatting
        run: ./mvnw spotless:check

      - name: Build
        run: ./mvnw clean verify

      # ─── Vulnerability Scan ──────────────────────────────────────────────────
      # Runs AFTER the normal build as a separate step — does NOT slow down
      # the regular build because the plugin has no lifecycle binding in pom.xml.
      #
      # NVD database is cached between runs (refreshed every 12 hours).
      # Without a key the first download takes 20–30 min; with a key ~2 min.
      # Register a free NVD API key: https://nvd.nist.gov/developers/request-an-api-key
      # Then add it as a GitHub secret named NVD_API_KEY.
      # ─────────────────────────────────────────────────────────────────────────

      - name: Cache NVD Database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          # Cache key rotates every 12 h so the DB stays up-to-date without
          # re-downloading the entire database on every single run.
          key: nvd-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nvd-db-${{ runner.os }}-

      - name: Vulnerability Scan (OWASP Dependency-Check)
        # Always runs — even if Build step fails — so a report is always produced.
        # continue-on-error: true  →  pipeline never blocks on CVEs (remove to enforce threshold).
        # failBuildOnCVSS is controlled in pom.xml (currently 11 = report only).
        if: always()
        continue-on-error: true
        run: |
          ./mvnw dependency-check:check \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      - name: Upload Vulnerability Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
            target/dependency-check-report.xml
          retention-days: 30

      - name: Sonar Analyze
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        run: |
          ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
            -Dsonar.organization=${SONAR_ORGANIZATION} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.newCode.referenceBranch=main \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true


on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-analyze:
    name: Build and Analyze
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: javacloudexpert
      SONAR_PROJECT_KEY: JavaCloudExpert_enterprise-microservice-boilerplate2  # displays as "enterprise-service" in SonarCloud
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}  # Optional: speeds up OWASP NVD database updates

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check Code Formatting
        run: ./mvnw spotless:check

      - name: Build
        run: ./mvnw clean verify

      - name: Vulnerability Scan (OWASP Dependency-Check)
        # Always runs even if previous steps fail, so the report is always generated.
        # failBuildOnCVSS is set to 11 (never fails build) — lower it in pom.xml to enforce a threshold.
        if: always()
        continue-on-error: true   # remove this line to make HIGH CVEs block the pipeline
        run: ./mvnw dependency-check:check -Denv.NVD_API_KEY=${{ secrets.NVD_API_KEY }}

      - name: Upload Vulnerability Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
            target/dependency-check-report.xml
          retention-days: 30   # keep reports for 30 days

      - name: Sonar Analyze
        if: ${{ env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        run: |
          ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
            -Dsonar.organization=${SONAR_ORGANIZATION} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.newCode.referenceBranch=main \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true
